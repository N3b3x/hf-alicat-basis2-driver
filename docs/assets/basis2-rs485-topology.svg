<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 220" width="680" height="220" role="img" aria-labelledby="title desc">
  <title id="title">RS-485 multidrop topology</title>
  <desc id="desc">MCU UART to UART-to-RS-485 transceiver, then differential bus to multiple BASIS-2 instruments.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      .box { fill: #f4f6f8; stroke: #1a365d; stroke-width: 2; }
      .bus { stroke: #2c5282; stroke-width: 4; fill: none; stroke-linecap: round; }
      .label { font-family: system-ui, sans-serif; font-size: 13px; fill: #1a202c; }
      .small { font-size: 11px; fill: #4a5568; }
      .title { font-size: 14px; font-weight: 600; fill: #1a365d; }
    ]]></style>
  </defs>

  <!-- MCU UART (logic-level) -->
  <rect class="box" x="24" y="56" width="104" height="88" rx="6" ry="6"/>
  <text class="title" x="76" y="92" text-anchor="middle">MCU UART</text>
  <text class="small" x="76" y="114" text-anchor="middle">TTL / CMOS side</text>

  <!-- UART to RS-485 transceiver -->
  <rect class="box" x="156" y="56" width="152" height="88" rx="6" ry="6"/>
  <text class="title" x="232" y="88" text-anchor="middle">UART to RS-485</text>
  <text class="title" x="232" y="106" text-anchor="middle">transceiver</text>
  <text class="small" x="232" y="128" text-anchor="middle">DE / RE, A/B to bus</text>

  <!-- Links: MCU to transceiver, transceiver to bus (centerline y = 100) -->
  <line class="bus" x1="128" y1="100" x2="156" y2="100"/>
  <line class="bus" x1="308" y1="100" x2="328" y2="100"/>

  <!-- RS-485 multidrop segment -->
  <rect x="328" y="92" width="300" height="16" fill="#e2e8f0" stroke="#2c5282" stroke-width="2" rx="3" ry="3"/>
  <text class="label" x="478" y="104" text-anchor="middle">RS-485 A/B (multidrop)</text>

  <!-- Drop from bus -->
  <line class="bus" x1="478" y1="108" x2="478" y2="132"/>
  <line class="bus" x1="350" y1="132" x2="606" y2="132"/>

  <!-- Instruments -->
  <g transform="translate(350, 136)">
    <rect class="box" width="72" height="48" rx="6" ry="6"/>
    <text class="label" x="36" y="22" text-anchor="middle">B-2</text>
    <text class="small" x="36" y="40" text-anchor="middle">addr 1</text>
  </g>
  <g transform="translate(442, 136)">
    <rect class="box" width="72" height="48" rx="6" ry="6"/>
    <text class="label" x="36" y="22" text-anchor="middle">B-2</text>
    <text class="small" x="36" y="40" text-anchor="middle">addr 2</text>
  </g>
  <g transform="translate(534, 136)">
    <rect class="box" width="72" height="48" rx="6" ry="6"/>
    <text class="label" x="36" y="22" text-anchor="middle">B-2</text>
    <text class="small" x="36" y="40" text-anchor="middle">addr N</text>
  </g>

  <!-- Below instrument blocks (bottom y=184); centered to avoid overlap with addr N -->
  <text class="small" x="478" y="206" text-anchor="middle">Up to 247 Modbus addresses</text>
</svg>
