---
# ESP32 Alicat BASIS-2 Driver — app matrix for build scripts / CI
version: "1.0"

metadata:
  project: "ESP32 Alicat BASIS-2 Driver Examples"
  default_app: "alicat_basis2_minimal_example"
  target: "esp32s3"
  idf_versions: ["release/v5.5", "release/v5.4"]
  build_types: [["Debug", "Release"], ["Debug"]]

apps:
  alicat_basis2_minimal_example:
    description: "Minimal single-instrument BASIS-2 read loop on ESP32-S3 UART1 RS-485"
    source_file: "alicat_basis2_minimal_example.cpp"
    category: "example"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug", "Release"]
    ci_enabled: true
    featured: true
    hardware_required: true
    features:
      - "EspUart in HF_UART_MODE_RS485 half-duplex (DE/RE on RTS pin)"
      - "Driver<UartT> CRTP serial bridge"
      - "Identity + ReadInstantaneous loop"

  alicat_basis2_full_example:
    description: "Comprehensive BASIS-2 example: discovery sweep, identity, configuration walkthrough, periodic instantaneous + measurement-window reads"
    source_file: "alicat_basis2_full_example.cpp"
    category: "example"
    idf_versions: ["release/v5.5"]
    build_types: ["Debug", "Release"]
    ci_enabled: true
    featured: true
    hardware_required: true
    features:
      - "DiscoverPresentAddresses sweep at boot"
      - "ReadIdentity + InstrumentIdentity print"
      - "SetGas / SetReferenceTemperatureC / SetFlowAveragingMs / SetCommWatchdogMs / SetTotalizerLimitMode"
      - "SetSetpointSource(DigitalUnsaved) + SetSetpoint (controllers)"
      - "Tare / ResetTotalizer"
      - "Periodic ReadInstantaneous() at 1 Hz"
      - "Measurement-window: ConfigureMeasurementTrigger / StartMeasurementSamples / ReadMeasurement"

build_config:
  build_types:
    Debug:
      description: "Debug build"
      cmake_build_type: "Debug"
      optimization: "-O0"
      debug_level: "-g3"
      defines: ["DEBUG"]

    Release:
      description: "Release build"
      cmake_build_type: "Release"
      optimization: "-O2"
      debug_level: "-g0"
      defines: ["NDEBUG"]

  build_directory_pattern: "build-app-{app_type}-type-{build_type}-target-{target}-idf-{idf_version}"
  project_name_pattern: "esp32_alicat_basis2_{app_type}_app"

ci_config:
  timeout_minutes: 30
  fail_fast: false
  exclude_combinations: []
  special_apps: []
